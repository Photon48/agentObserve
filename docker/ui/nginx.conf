server {
  listen       80;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # SPA fallback — any non-asset, non-/api path serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy /api/* to the api container (service name in docker-compose).
  location /api/ {
    proxy_pass         http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Tiny cache for static assets that vite fingerprints by content hash.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Don't cache index.html or VERSION — they need to reflect new releases.
  location = /index.html { add_header Cache-Control "no-cache"; }
  location = /VERSION    { add_header Cache-Control "no-cache"; }
}
