# Dev override: hot reload + bind-mounted source. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Receiver: uvicorn --reload watches otel_receiver.py
# API:      node --watch reloads on server/ changes
# UI:       vite dev server on :5173 (replaces nginx) with /api proxy to api:3001

services:
  receiver:
    volumes:
      - ./otel_receiver.py:/app/otel_receiver.py
    command:
      - uv
      - run
      - uvicorn
      - otel_receiver:app
      - --host
      - 0.0.0.0
      - --port
      - "4318"
      - --reload
      - --log-level
      - info

  api:
    volumes:
      - ./server:/app/server
      - ./VERSION:/app/VERSION
    command: ["node", "--watch", "server/index.js"]

  ui:
    image: node:20-alpine
    container_name: agentobserve-ui
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./vite.config.js:/app/vite.config.js
      - ./index.html:/app/index.html
      - ./src:/app/src
      - ./VERSION:/app/VERSION
      - ui_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

volumes:
  ui_node_modules:
