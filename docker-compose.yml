# Production-ish stack: builds images locally for now.
# Phase 2 will switch `build:` → `image: ghcr.io/photon48/agentobserve-*:VERSION`.

services:
  receiver:
    build:
      context: .
      dockerfile: docker/receiver.Dockerfile
    container_name: agentobserve-receiver
    ports:
      - "4318:4318"
    volumes:
      - ./telemetry:/data
      # Claude Code (host process) writes raw API bodies here when
      # OTEL_LOG_RAW_API_BODIES=file:/tmp/agentobserve_bodies. Mounted at the
      # identical path so the body_ref attributes in incoming logs resolve and
      # _relocate_body_refs can move the files into telemetry/<session>/.
      - /tmp/agentobserve_bodies:/tmp/agentobserve_bodies
    environment:
      TELEMETRY_DIR: /data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: agentobserve-api
    ports:
      - "3001:3001"
    volumes:
      - ./telemetry:/data
    environment:
      TELEMETRY_DIR: /data
      GITHUB_REPO: Photon48/agentObserve
      # Pass-throughs (unset by default; set in the host shell to override).
      #   AGENTOBSERVE_UPDATE_SOURCE      `github` | `disabled`
      #   AGENTOBSERVE_VERSION_OVERRIDE   simulate an older local install
      AGENTOBSERVE_UPDATE_SOURCE: ${AGENTOBSERVE_UPDATE_SOURCE:-}
      AGENTOBSERVE_VERSION_OVERRIDE: ${AGENTOBSERVE_VERSION_OVERRIDE:-}
    depends_on:
      - receiver
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    container_name: agentobserve-ui
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
